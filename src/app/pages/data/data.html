<div class="container-fluid">
  <div class="row align-items-center">
    <div class="col-12 text-center my-3">
      <h2>Data Categories</h2>
    </div>
  </div>
</div>

<div class="container">
  <div class="row align-items-center justify-content-center g-3 my-3">
    @if (aryPages && aryPages.length > 0) {
      @for (ary of aryPages; track ary.id) {
        <div class="col-6 col-md-6 col-lg-4 col-xl-3 col-xxl-2 animate__animated animate__fadeIn">
          <a class="lnk" [routerLink]="ary.link">
            <div class="card carddata">
              <div class="card-body">
                <i [classList]="'bi ' + ary.icon"></i>
                {{ ary.title }}
              </div>
            </div>
          </a>
        </div>
      }
    } @else {
      <div class="col-12">
        <div class="blkwarn">
          <i class="bi bi-exclamation-warning warnico"></i>
          <p class="warntitle">No categories!</p>
        </div>
      </div>
    }
  </div>
</div>

<div class="clearfix"></div>
