<div class="container w-100">
  <div class="row">
    <div class="col-12 col-md-12 colfdanimes1">
      <div class="d-block text-center mx-auto">
        <h2>
          <i class="bi bi-tv"></i>
          Delete Animes Info
        </h2>
      </div>

      <div class="row mt-3">
        <div class="col-12">
           @if (isLoading) {
            <app-loading />
          }

          @if (!isLoading) {
            @if ((animesdata$ | async) === null || (animesdata$ | async) === undefined) {
              <app-alert [data]="dataAlert" />
            }

            @if ((animesdata$ | async) !== null && (animesdata$ | async) !== undefined) {
              <pre class="mblkcode">
                <code class="blkcode">{{animesdata$ | async | prettyJson}}</code>
              </pre>
            }
          }
        </div>
       </div>

      <div class="form d-flex justify-content-center align-items-center w-100 h-auto">
        <form
          [formGroup]="formDeleteAnimes"
          (ngSubmit)="onSubmit()"
          action=""
          class="frmupdateanimes d-block text-center"
        >
          <div class="form-group hidden">
            <label for="id" class="lblid text-center">
              <i class="bi bi-alphabet"></i>
              Id
            </label>
            <input
              type="number"
              min="0"
              max="10"
              name="animeId"
              id="animeId"
              class="animeId form-control disabled mt-3"
              formControlName="animeId"
              placeholder="Please write your id of animes here..."
              [disabled]="true"
              [readOnly]="true"
            />
          </div>
          <div class="form-group mt-3">
            <div class="d-flex justify-content-center align-items-center">
              <input type="button" value="Reset" class="btn btn-secondary btnreset btnrounded" (click)="onReset()" />
              <input
                type="submit"
                value="Submit"
                class="btn btn-primary btnsubmit btnrounded ms-2"
              />
            </div>
          </div>
          <div class="form-group mt-3 mx-auto text-center">
            <a routerLink="/data/animes" class="btn btn-primary btnback btnrounded">Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
